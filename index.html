<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المعلم - نظام العلامات المتقدم</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                <h1>نظام إدارة العلامات المتقدم</h1>
            </div>
            <p>مرحباً بك. يرجى إعداد قالب المواد أولاً، ثم إدخال بيانات الطلاب بسهولة.</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-target="student-section">إدخال علامات طالب</button>
            <button class="tab-btn" data-target="template-section">إعداد قالب المواد</button>
            <button class="tab-btn" data-target="table-section">سجل الطلاب</button>
        </div>

        <main>
            <!-- 1. Student Grade Entry Section -->
            <section class="card form-section active-section" id="student-section">
                <h2>إصدار شهادة طالب</h2>
                <form id="student-form">
                    <div class="row">
                        <div class="input-group">
                            <label>رقم الجلوس</label>
                            <input type="number" id="seatNumber" required>
                        </div>
                        <div class="input-group">
                            <label>اسم الطالب الرباعي</label>
                            <input type="text" id="name" required>
                        </div>
                    </div>

                    <div class="divider">المواد الأكاديمية</div>
                    
                    <div id="student-subjects-container">
                        <!-- Subjects will be loaded here from template -->
                    </div>

                    <div style="text-align: left; margin-bottom: 2rem;">
                        <button type="button" class="btn-outline" id="btn-add-extra-subject">
                            + إضافة مادة إضافية مخصصة لهذا الطالب
                        </button>
                    </div>

                    <button type="submit" class="btn-primary" id="btn-submit-student">
                        حفظ النتيجة في النظام
                    </button>
                    <div id="student-status-message" class="status-message"></div>
                </form>
            </section>

            <!-- 2. Template Definition Section -->
            <section class="card form-section" id="template-section" style="display: none;">
                <h2>القالب الافتراضي للمواد</h2>
                <p style="color: var(--text-muted); margin-bottom: 1rem; font-size: 0.9rem;">
                    ستظهر هذه المواد تلقائياً عند إضافة أي طالب جديد.
                </p>
                <form id="template-form">
                    <div id="template-subjects-container">
                        <!-- Default Template Subjects injected here -->
                    </div>

                    <div style="text-align: left; margin-bottom: 2rem;">
                        <button type="button" class="btn-outline" id="btn-add-template-subject">
                            + مادة جديدة للقالب
                        </button>
                    </div>

                    <button type="submit" class="btn-primary">
                        حفظ القالب الافتراضي
                    </button>
                    <div id="template-status-message" class="status-message"></div>
                </form>
            </section>

            <!-- 3. Students Table Section -->
            <section class="card table-section" id="table-section" style="display: none; grid-column: span 2;">
                <h2>سجل الطلاب المسجلين</h2>
                <div class="table-container">
                    <table id="students-table">
                        <thead>
                            <tr>
                                <th>رقم الجلوس</th>
                                <th>اسم الطالب</th>
                                <th>المعدل التراكمي</th>
                                <th>الحالة</th>
                            </tr>
                        </thead>
                        <tbody id="students-body">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
